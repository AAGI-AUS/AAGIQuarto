---
name: demo-website
on:
  push:
    branches:
      - main
      - feature/**
      - fix/**
  pull_request:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  demo-page:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AAGI_AUTO_INSTALL: true
    runs-on: ubuntu-latest
    concurrency:
      group: quarto-publish-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install pak
        run: install.packages('pak', repos = 'https://r-lib.github.io/p/pak/dev/')
        shell: Rscript {0}

      - name: Install R (and system) dependencies with pak
        run: |
          pak::pak(c(
            "knitr",
            "rmarkdown",
            "downlit",
            "xml2",
            "ggplot2",
            "sysfonts",
            "flextable",
            "gapminder",
            "dplyr",
            "gt",
            "tinytex",
            "AAGI-AUS/AAGIThemes",
            "AAGI-AUS/AAGIPalettes"
          ))
        shell: Rscript {0}

      # Install ms-corefonts for Arial (Proxima Nova not available on runners)
      - name: Install ms-corefonts
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer

      # Install rsvg-convert for SVG -> PNG/PDF conversion
      - name: Install rsvg-convert
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install -y librsvg2-bin

      - name: Update font cache
        run: sudo fc-cache -fv

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "release"
          tinytex: true

      - name: Add extension directly into demos
        working-directory: ./docs
        run: quarto add AAGI-AUS/AAGIQuarto --no-prompt

      - name: Render example outputs (PDF, DOCX, PPTX, RevealJS)
        run: make assets

      - name: Render site
        run: cd docs && quarto render

      - name: Copy assets into site 
        run: rsync -av docs/assets/ docs/_site/assets/

      - name: Build templates zip from current source
        run: |
          cd docs
          mkdir -p _site/_files
          zip -r _site/_files/templates.zip template*.qmd references.bib _scripts/ _includes/ 

      - name: Reset Quarto publish state
        run: rm -rf docs/.quarto/publish

      - name: Publish site
        if: github.event_name != 'pull_request'
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs
          render: false
