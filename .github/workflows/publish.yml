on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch: {}

name: demo-website

jobs:
  demo-page:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      AAGI_AUTO_INSTALL: "true"

    runs-on: ubuntu-latest

    # Restrict concurrent publishes per ref
    concurrency:
      group: quarto-publish-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # recommended for versioned sites / changelogs

      # Quarto's knitr engine needs R available
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install pak
        run: install.packages('pak', repos = 'https://r-lib.github.io/p/pak/dev/')
        shell: Rscript {0}

      - name: Install R (and system) dependencies with pak
        run: |
          pak::pak(c(
            "knitr",
            "rmarkdown",
            "downlit",
            "xml2",
            "ggplot2",
            "sysfonts",
            "flextable",
            "gapminder",
            "dplyr",
            "gt",
            "tinytex",
            "AAGI-AUS/AAGIThemes",
            "AAGI-AUS/AAGIPalettes"
          ))
        shell: Rscript {0}

      # Install ms-corefonts for Arial (Proxima Nova not available on runners)
      - name: Install ms-corefonts
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer

      # NEW: Install rsvg-convert for SVG → PNG/PDF conversion
      - name: Install rsvg-convert
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get install -y librsvg2-bin

      - name: Update font cache
        run: sudo fc-cache -fv

      # Back to our regularly scheduled Quarto output
      - name: "Set up Quarto"
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "release"
          tinytex: true

      - name: Copy favicons to docs
        run: |
          ls -v docs/favicon* || echo "No favicons found in docs/"

      - name: Add extension directly into demos
        working-directory: ./docs
        run: |
          quarto add AAGI-AUS/AAGIQuarto --no-prompt
 
      # The Makefile in / will render all the Quarto documents located in /docs/demos in this step
      - name: Publish to GitHub Pages (and render)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs

      - name: Create templates zip file
        run: |
          cd docs
          mkdir _files
          zip -r AAGI_templates.zip template*.qmd _scripts/ _includes/
          mv AAGI_templates.zip _files

      - name: Copy favicons to gh-pages root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          cp ../docs/favicon* ./ 2>/dev/null || echo "No favicons to copy"
          git add favicon.ico favicon.png favicon.svg favicon-32x32.png || true
          git diff --cached --quiet || git commit -m "Update favicons"
          git push origin gh-pages
