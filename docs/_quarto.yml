project:
  type: website

website:
  title: "AAGIQuarto"
  reader-mode: true
  repo-url: https://github.com/AAGI-AUS/AAGIQuarto
  repo-actions: [edit, issue]
  margin-header: |
    ![](_extensions/AAGI-AUS/aagi/assets/AAGI_logo.svg)
  body-footer: |
    ![](_extensions/AAGI-AUS/aagi/assets/AAGI_SP_Logo_Block-Portrait.svg)
  sidebar:
    style: "floating"
    search: true
    tools:
      - icon: github
        href: https://github.com/AAGI-AUS/AAGIQuarto
    contents:
      - text: "Home"
        file: index.qmd
      - section: "Extra"
        contents:
          - release-notes.qmd

format:
  html:
    toc: true
    theme:
      - none
      - _extensions/AAGI-AUS/aagi/html/aagi-html.scss
    head: |
      <link rel="icon" type="image/svg+xml" href="/AAGIQuarto/favicon.svg">
      <link rel="icon" type="image/png" sizes="32x32" href="/AAGIQuarto/favicon-32x32.png">
      <link rel="alternate icon" href="/AAGIQuarto/favicon.ico">
