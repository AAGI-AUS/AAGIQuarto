project:
  type: website

website:
  title: "AAGIQuarto"
  reader-mode: true
  repo-url: https://github.com/AAGI-AUS/AAGIQuarto
  repo-actions: [edit, issue]
  margin-header: |
    ![](aagi/assets/AAGI_logo.svg)
  body-footer: |
    ![](aagi/assets/AAGI_SP_Logo_Block-Portrait.svg)
  sidebar:
    style: "floating"
    search: true
    tools:
      - icon: github
        href: https://github.com/AAGI-AUS/AAGIQuarto
    contents:
      - text: "Home"
        file: index.qmd
      - section: "Extra"
        contents:
          - release-notes.qmd
format:
  html:
    toc: true
    theme:
      - none
      - aagi/revealjs/aagi.scss
