project:
  type: website
  resources:
    - favicon.ico
    - favicon.png
    - favicon.svg

website:
  title: "AAGIQuarto"
  reader-mode: true
  repo-url: "https://github.com/AAGI-AUS/AAGIQuarto"
  repo-actions: [edit, issue]
  favicon: favicon.svg
  margin-header: |
    ![](_extensions/AAGI-AUS/aagi/assets/AAGI_logo.svg)
  body-footer: |
    ![](_extensions/AAGI-AUS/aagi/assets/AAGI_SP_Logo_Block-Portrait.svg)
  sidebar:
    style: "floating"
    search: true
    tools:
      - icon: github
        href: "https://github.com/AAGI-AUS/AAGIQuarto"
    contents:
      - text: "Home"
        file: index.qmd
      - section: "Extra"
        contents:
          - release-notes.qmd

# Unified format settings (one place only)
format:
  html:
    toc: true
    theme:
      - none
      - _extensions/AAGI-AUS/aagi/html/aagi-html.scss
  docx: {}
  pdf: {}

# Global defaults and shared params for example docs (individual docs may override)
execute:
  echo: false

knitr:
  opts_chunk:
    fig.path: figures/
    fig.pos: H
    fig.width: 7
    fig.height: 5

params:
  uni:
    values:
      CU: "Curtin University"
      AU: "University of Adelaide"
      UQ: "University of Queensland"
      ANU: "Australian National University"
    value: CU

  uni_info:
    CU:
      name: "Curtin University"
    AU:
      name: "University of Adelaide"
    UQ:
      name: "University of Queensland"
    ANU:
      name: "Australian National University"

bibliography: references.bib
csl: _extensions/AAGI-AUS/aagi/assets/biometrics.csl
