title: AAGIQuarto
author: Adam H. Sparks, James J. Balamuta, Russell Edson, Vinh Thiem Ma, Rose Megirian, Zhanglong Cao, Sam Rogers, Julian Taylor, Peter Misiun
version: 2.0.0
quarto-required: ">=1.4.0 <2.0.0"
contributes:
  formats:
    revealjs:
      theme: default
      css:
        - revealjs/aagi.scss
      embed-resources: true
      format-resources:
        - assets/AAGI_logo.svg
        - assets/title-slide-main.png
        - assets/fonts/FiraCode-Bold.woff2
        - assets/fonts/FiraCode-Light.woff2
        - assets/fonts/FiraCode-Medium.woff2
        - assets/fonts/FiraCode-Regular.woff2
        - assets/fonts/FiraCode-VF.woff2
        - assets/fonts/FiraCode-Bold.ttf
        - assets/fonts/FiraCode-Light.ttf
        - assets/fonts/FiraCode-Medium.ttf
        - assets/fonts/FiraCode-Regular.ttf
        - assets/fonts/FiraCode-Retina.ttf
      logo: AAGI_logo.svg
      title-slide-attributes:
        data-background-image: title-slide-main.png
        data-background-size: 1050px auto
        data-background-position: 50% 85%
      date-format: long
      slide-number: true
      footer: ""
      highlight-style: breeze
      overview: true
      progress: true
      touch: true
      chalkboard: false
      execute:
        echo: true
    pdf+report:
      template: pdf-report/template.tex
      pdf-engine: xelatex
      csl: assets/biometrics.csl
      fig-format: pdf
      format-resources:
        - assets/**
      partials:
        - partials/preamble.tex
        - partials/pagestyle.tex
        - partials/header.tex
        - partials/footer.tex
    pdf+short-report:
      template: pdf-short-report/template.tex
      pdf-engine: xelatex
      csl: assets/biometrics.csl
      fig-format: pdf
      format-resources:
        - assets/**
      partials:
        - partials/preamble.tex
        - partials/pagestyle.tex
        - partials/header.tex
        - partials/footer.tex
    docx+report:
      reference-doc: docx-report/template.docx
      toc: true
    docx+short+report:
      reference-doc: docx-short-report/template.docx
    pptx:
      reference-doc: pptx/template.pptx
      toc: true
      number-sections: false
      incremental: true
    html+report:
      theme:
        - none
        - html/aagi-html.scss
      toc: true
      toc-depth: 3
      number-sections: true
      embed-resources: true
      format-resources:
        - assets/AAGI_logo.svg
        - assets/AAGI_SP_Logo_Block-Portrait.svg
        - assets/fonts/FiraCode-Regular.woff2
        - assets/fonts/FiraCode-Medium.woff2
        - assets/fonts/FiraCode-Bold.woff2
    html+short+report:
      theme:
        - none
        - html/aagi-html.scss
      toc: false
      number-sections: false
      embed-resources: true
      format-resources:
        - assets/AAGI_logo.svg
        - assets/AAGI_SP_Logo_Block-Portrait.svg
        - assets/fonts/FiraCode-Regular.woff2
        - assets/fonts/FiraCode-Medium.woff2
        - assets/fonts/FiraCode-Bold.woff2
  resources:
    - assets/**
