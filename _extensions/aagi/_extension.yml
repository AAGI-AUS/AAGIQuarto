title: AAGIQuarto
author: Adam H. Sparks, James J. Balamuta, Russell Edson, Vinh Thiem Ma, Rose Megirian, Zhanglong Cao, Sam Rogers, Julian Taylor, Peter Misiun
version: 0.1.5
quarto-required: ">=1.4.0"
contributes:
  formats:
    revealjs:
      theme: default
      css:
        - revealjs/aagi.scss

      # stage extension assets and reference them by basename
      format-resources:
        - assets/AAGI_logo.svg
        - assets/title-slide-main.png

      logo: AAGI_logo.svg
      title-slide-attributes:
        data-background-image: title-slide-main.png
        data-background-size: 1050px auto
        data-background-position: 50% 85%

      date-format: long
      slide-number: true
      footer: ""
      highlight-style: breeze
      overview: true
      progress: true
      touch: true
      chalkboard: true
      execute:
        echo: true

    pdfreport:
      template: pdf-report/template.tex
      pdf-engine: xelatex
      csl: assets/biometrics.csl
      resources:
        - assets/AAGI_logo.pdf
        - assets/AAGI_SP_Logo_Block-Portrait.pdf
      format-resources:
        - assets/AAGI_logo.pdf
        - assets/AAGI_SP_Logo_Block-Portrait.pdf
        - assets/biometrics.csl

    pdfshortreport:
      template: pdf-short-report/template.tex
      pdf-engine: xelatex
      csl: assets/biometrics.csl
      link-citations: true
      resources:
        - assets/AAGI_logo.pdf
        - assets/AAGI_SP_Logo_Block-Portrait.pdf
      format-resources:
        - assets/AAGI_logo.pdf
        - assets/AAGI_SP_Logo_Block-Portrait.pdf
        - assets/biometrics.csl

    docxreport:
      reference-doc: docx-report/template.docx
      toc: true

    docxshortreport:
      reference-doc: docx-short-report/template.docx

    pptx:
      reference-doc: pptx/template.pptx
      toc: true
      number-sections: false
      incremental: true

    htmlreport:
      theme:
        - none
        - html/aagi-html.scss
      toc: true
      toc-depth: 3
      number-sections: true
      format-resources:
        - assets/AAGI_logo.svg
        - assets/AAGI_SP_Logo_Block-Portrait.svg

    htmlshortreport:
      theme:
        - none
        - html/aagi-html.scss
      toc: false
      number-sections: false
      format-resources:
        - assets/AAGI_logo.svg
        - assets/AAGI_SP_Logo_Block-Portrait.svg
